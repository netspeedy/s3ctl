<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="rc-title rc-desc">
  <title id="rc-title">s3ctl</title>
  <desc id="rc-desc">A branded dark terminal-style card for s3ctl, a single-binary CLI for creating S3-compatible buckets and issuing bucket-scoped credentials.</desc>
  <defs>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#020610" flood-opacity="0.45" />
    </filter>
  </defs>

  <g filter="url(#soft-shadow)">
    <rect x="56" y="54" width="1088" height="522" rx="38" fill="#0f1218" stroke="#2d3d52" stroke-width="2" />
    <rect x="80" y="78" width="1040" height="60" rx="18" fill="#171d26" fill-opacity="0.78" stroke="#2d3d52" stroke-width="1" />
    <circle cx="114" cy="108" r="8" fill="#ef4444" />
    <circle cx="142" cy="108" r="8" fill="#f5b841" />
    <circle cx="170" cy="108" r="8" fill="#22c55e" />
    <text x="212" y="115" fill="#aab5c4" font-family="Fira Code, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">netspeedy.github.io/s3ctl</text>

    <text x="96" y="206" fill="#4bd8ff" font-family="Fira Code, SFMono-Regular, Menlo, Consolas, monospace" font-size="22" font-weight="600" letter-spacing="7">S3 COMPATIBLE CLI</text>

    <text x="92" y="300" font-family="Inter, Arial, Helvetica, sans-serif" font-size="92" font-weight="800" letter-spacing="-3"><tspan fill="#4bd8ff">s3</tspan><tspan fill="#f4f8ff">ctl</tspan></text>

    <text x="96" y="368" fill="#e2e8f0" font-family="Inter, Arial, Helvetica, sans-serif" font-size="32" font-weight="600">A single-binary CLI for creating S3-compatible buckets</text>
    <text x="96" y="410" fill="#e2e8f0" font-family="Inter, Arial, Helvetica, sans-serif" font-size="32" font-weight="600">and issuing bucket-scoped credentials.</text>

    <text x="96" y="486" fill="#aab5c4" font-family="Inter, Arial, Helvetica, sans-serif" font-size="24">Buckets, scoped credentials, OVHcloud rotation,</text>
    <text x="96" y="520" fill="#aab5c4" font-family="Inter, Arial, Helvetica, sans-serif" font-size="24">and batch provisioning from one clean CLI.</text>

    <g fill="none" stroke="#4bd8ff" stroke-linecap="round" stroke-width="2" opacity="0.5">
      <path d="M860 486H980" />
      <path d="M980 486C1010 486 1010 528 1040 528H1090" />
      <path d="M980 486C1010 486 1010 444 1040 444H1090" />
    </g>
    <g fill="#f5b841">
      <circle cx="860" cy="486" r="6" />
      <circle cx="980" cy="486" r="6" />
      <circle cx="1090" cy="444" r="6" />
      <circle cx="1090" cy="528" r="6" />
    </g>
  </g>
</svg>
